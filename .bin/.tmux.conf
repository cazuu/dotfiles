# ===========================================
# tmux configuration for AI coding assistants
# ===========================================

# -------------------------------------------
# General Settings
# -------------------------------------------
set -g default-terminal "tmux-256color"
set -g history-limit 200000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 10
setw -g aggressive-resize on

# Locale: inherit from the parent shell to avoid mismatches
set -g update-environment "LANG LC_ALL"

# -------------------------------------------
# Prefix Key
# -------------------------------------------
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# -------------------------------------------
# Mouse Support
# -------------------------------------------
set -g mouse on

# Use tmux's default mouse behavior

# -------------------------------------------
# Window & Pane Index
# -------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# -------------------------------------------
# Key Bindings - Window Management
# -------------------------------------------
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# Quick window switching with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# -------------------------------------------
# Key Bindings - Pane Management
# -------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Arrow key pane navigation
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Pane resizing with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Layout switching
bind Space next-layout
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# -------------------------------------------
# Key Bindings - Session Management
# -------------------------------------------
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind s choose-tree -sZ
bind w choose-tree -wZ

# Quick reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# -------------------------------------------
# Copy Mode (Vi-style)
# -------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Quick copy mode entry with prefix + [
bind [ copy-mode

# Page up/down in copy mode
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down

# Search in copy mode
bind -T copy-mode-vi / command-prompt -i -p "search down:" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "search up:" "send -X search-backward-incremental \"%%%\""

# -------------------------------------------
# Status Bar
# -------------------------------------------
set -g status-position top
set -g status-justify left
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left: Session name
set -g status-left-length 30
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e]'

# Right: Date and time
set -g status-right-length 50
set -g status-right '#[fg=#45475a]#[fg=#cdd6f4,bg=#45475a] %Y-%m-%d #[fg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M '

# Window status
setw -g window-status-format '#[fg=#6c7086] #I:#W '
setw -g window-status-current-format '#[fg=#f9e2af,bold] #I:#W '
setw -g window-status-separator ''

# -------------------------------------------
# Pane Border
# -------------------------------------------
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# -------------------------------------------
# Message Style
# -------------------------------------------
set -g message-style 'fg=#1e1e2e bg=#f9e2af bold'
